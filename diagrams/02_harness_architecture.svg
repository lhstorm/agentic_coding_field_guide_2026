<svg viewBox="0 0 780 540" xmlns="http://www.w3.org/2000/svg" font-family="Calibri, Arial, sans-serif">
  <defs>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ec4899"/></marker>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse"><path d="M8,0 L0,3 L8,6" fill="#10b981"/></marker>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f59e0b"/></marker>
  </defs>

  <!-- Title -->
  <text x="390" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1b4b">The Agent Harness — Conceptual Architecture</text>

  <!-- Outer harness boundary -->
  <rect x="70" y="55" width="640" height="430" rx="24" fill="#fafafe" stroke="#4f46e5" stroke-width="2.5" stroke-dasharray="10,5"/>
  <rect x="310" y="42" width="160" height="26" rx="4" fill="#fff"/>
  <text x="390" y="61" text-anchor="middle" font-size="14" font-weight="700" fill="#4f46e5">THE HARNESS</text>

  <!-- INFORM (top) -->
  <rect x="240" y="75" width="300" height="65" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="390" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">INFORM</text>
  <text x="390" y="120" text-anchor="middle" font-size="11" fill="#374151">Context files, project knowledge, specifications</text>
  <!-- Sub-components -->
  <rect x="105" y="82" width="110" height="22" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="160" y="97" text-anchor="middle" font-size="9" fill="#1d4ed8">CLAUDE.md</text>
  <rect x="105" y="110" width="110" height="22" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="160" y="125" text-anchor="middle" font-size="9" fill="#1d4ed8">MCP Servers</text>
  <rect x="565" y="82" width="110" height="22" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="620" y="97" text-anchor="middle" font-size="9" fill="#1d4ed8">Skills</text>
  <rect x="565" y="110" width="110" height="22" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="620" y="125" text-anchor="middle" font-size="9" fill="#1d4ed8">Progress Files</text>

  <!-- CONSTRAIN (left) -->
  <rect x="85" y="210" width="145" height="130" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="158" y="255" text-anchor="middle" font-size="14" font-weight="700" fill="#be185d">CONSTRAIN</text>
  <text x="158" y="275" text-anchor="middle" font-size="10" fill="#374151">Rules, boundaries,</text>
  <text x="158" y="290" text-anchor="middle" font-size="10" fill="#374151">allowed actions,</text>
  <text x="158" y="305" text-anchor="middle" font-size="10" fill="#374151">approval gates</text>

  <!-- VERIFY (right) -->
  <rect x="550" y="210" width="145" height="130" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="623" y="255" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">VERIFY</text>
  <text x="623" y="275" text-anchor="middle" font-size="10" fill="#374151">Tests, linting,</text>
  <text x="623" y="290" text-anchor="middle" font-size="10" fill="#374151">CI validation,</text>
  <text x="623" y="305" text-anchor="middle" font-size="10" fill="#374151">security scanning</text>

  <!-- CORRECT (bottom) -->
  <rect x="240" y="405" width="300" height="65" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="390" y="431" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">CORRECT</text>
  <text x="390" y="450" text-anchor="middle" font-size="11" fill="#374151">Feedback loops, error recovery, hooks, self-repair</text>

  <!-- Center — AI Model -->
  <circle cx="390" cy="275" r="85" fill="#4f46e5" stroke="#312e81" stroke-width="2"/>
  <text x="390" y="258" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">AI Model</text>
  <text x="390" y="280" text-anchor="middle" font-size="12" fill="#c7d2fe">Fast and powerful</text>
  <text x="390" y="297" text-anchor="middle" font-size="12" fill="#c7d2fe">but needs direction</text>

  <!-- Connecting arrows -->
  <line x1="390" y1="140" x2="390" y2="190" stroke="#3b82f6" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="230" y1="275" x2="305" y2="275" stroke="#ec4899" stroke-width="2" marker-end="url(#a3)"/>
  <line x1="475" y1="275" x2="550" y2="275" stroke="#10b981" stroke-width="2" marker-end="url(#a4)"/>
  <line x1="390" y1="360" x2="390" y2="405" stroke="#f59e0b" stroke-width="2" marker-end="url(#a5)"/>

  <!-- Bottom note -->
  <text x="390" y="520" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">The harness channels the model's power. Without it, the model is capable but unpredictable.</text>
  <text x="390" y="536" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">The concept extends the traditional software test harness into full agent lifecycle management.</text>
</svg>
