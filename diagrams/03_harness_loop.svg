<svg viewBox="0 0 820 340" xmlns="http://www.w3.org/2000/svg" font-family="Calibri, Arial, sans-serif">
  <defs>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#475569"/></marker>
    <marker id="aGr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#10b981"/></marker>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ef4444"/></marker>
  </defs>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#1e1b4b">The Harness Loop — How an Agent Processes a Task</text>

  <!-- Start pill -->
  <rect x="20" y="145" width="105" height="50" rx="25" fill="#4f46e5"/>
  <text x="73" y="175" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">You: Task</text>

  <!-- Plan -->
  <rect x="165" y="138" width="120" height="64" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="225" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Plan</text>
  <text x="225" y="184" text-anchor="middle" font-size="10" fill="#374151">Read context, decide</text>

  <!-- Execute -->
  <rect x="325" y="138" width="120" height="64" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="385" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">Execute</text>
  <text x="385" y="184" text-anchor="middle" font-size="10" fill="#374151">Write code, call tools</text>

  <!-- Verify -->
  <rect x="485" y="138" width="120" height="64" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="545" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Verify</text>
  <text x="545" y="184" text-anchor="middle" font-size="10" fill="#374151">Run tests, lint, check</text>

  <!-- Decision diamond -->
  <polygon points="670,170 715,138 760,170 715,202" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="715" y="174" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Pass?</text>

  <!-- Done pill -->
  <rect x="675" y="260" width="80" height="42" rx="21" fill="#10b981"/>
  <text x="715" y="286" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Done</text>

  <!-- Correct box (top, feedback) -->
  <rect x="325" y="52" width="120" height="48" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="385" y="73" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">Correct</text>
  <text x="385" y="88" text-anchor="middle" font-size="10" fill="#374151">Fix errors, adjust</text>

  <!-- Forward arrows -->
  <line x1="125" y1="170" x2="165" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#aG)"/>
  <line x1="285" y1="170" x2="325" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#aG)"/>
  <line x1="445" y1="170" x2="485" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#aG)"/>
  <line x1="605" y1="170" x2="670" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#aG)"/>

  <!-- Yes arrow down -->
  <line x1="715" y1="202" x2="715" y2="260" stroke="#10b981" stroke-width="2" marker-end="url(#aGr)"/>
  <text x="730" y="234" font-size="11" fill="#10b981" font-weight="700">Yes</text>

  <!-- No arrow up and loop back -->
  <path d="M715,138 L715,76 L445,76" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#aR)"/>
  <text x="730" y="108" font-size="11" fill="#ef4444" font-weight="700">No</text>
  <path d="M325,76 L225,76 L225,138" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#aR)"/>

  <!-- Loop annotation -->
  <text x="570" y="48" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">This loop repeats until the task passes all verification checks</text>

  <!-- Bottom caption -->
  <text x="410" y="330" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">Unlike a single prompt-and-answer, agents operate in continuous plan-execute-verify-correct loops.</text>
</svg>
